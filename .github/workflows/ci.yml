name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx nx format:check --base=origin/main

      - name: Lint affected
        run: npx nx affected -t lint --base=origin/main --head=HEAD

      - name: Test affected
        run: npx nx affected -t test --base=origin/main --head=HEAD --configuration=ci

      - name: Build affected
        run: npx nx affected -t build --base=origin/main --head=HEAD --configuration=production
