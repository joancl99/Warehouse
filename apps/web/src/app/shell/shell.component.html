<ion-menu contentId="main-content" menuId="main-menu" type="overlay">
  <ion-content>
    <div class="menu-wrap">

      <!-- Header -->
      <div class="menu-header">
        <div class="menu-logo">
          <ion-icon name="cube-sharp"></ion-icon>
        </div>
        <div class="menu-brand">
          <span class="menu-app-name">WarehouseApp</span>
          @if (currentUser()) {
            <span class="menu-user-name">{{ currentUser()!.name }}</span>
          }
        </div>
        @if (currentUser()) {
          <div class="menu-role-badge role-{{ currentUser()!.role | lowercase }}">
            <ion-icon name="shield-checkmark-outline"></ion-icon>
            {{ currentUser()!.role }}
          </div>
        }
        <div class="menu-status">
          <span class="status-dot"></span>
          <span>En línea</span>
        </div>
      </div>

      <div class="menu-divider"></div>

      <!-- Nav items -->
      <nav class="menu-nav">
        @for (item of navItems(); track item.route) {
          <ion-menu-toggle auto-hide="false">
            <a
              class="menu-item"
              [routerLink]="item.route"
              routerLinkActive="active"
            >
              <span class="menu-item-icon">
                <ion-icon [name]="item.icon"></ion-icon>
              </span>
              <span class="menu-item-label">{{ item.label }}</span>
            </a>
          </ion-menu-toggle>
        }
      </nav>

      <!-- Logout -->
      <div class="menu-footer">
        <div class="menu-divider"></div>
        <ion-menu-toggle auto-hide="false">
          <button class="menu-item menu-item--logout" (click)="logout()">
            <span class="menu-item-icon">
              <ion-icon name="log-out-outline"></ion-icon>
            </span>
            <span class="menu-item-label">Cerrar sesión</span>
          </button>
        </ion-menu-toggle>
      </div>

    </div>
  </ion-content>
</ion-menu>

<ion-router-outlet id="main-content"></ion-router-outlet>

<!-- Scanner FAB — global, always visible -->
<ion-fab slot="fixed" vertical="bottom" horizontal="end">
  <ion-fab-button class="scanner-fab" (click)="openScanner()">
    <ion-icon name="barcode-outline"></ion-icon>
  </ion-fab-button>
</ion-fab>
